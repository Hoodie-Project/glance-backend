<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{admin/layout :: head('대시보드')}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/layout :: sidebar('dashboard')}"></div>

        <div class="col-10 p-4">
            <h4 class="fw-bold mb-4">대시보드</h4>

            <!-- 통계 카드 -->
            <div class="row g-3 mb-5">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-primary bg-opacity-10 rounded p-3">
                                <i class="bi bi-chat-square-text fs-4 text-primary"></i>
                            </div>
                            <div>
                                <div class="text-muted small">전체 게시글</div>
                                <div class="fw-bold fs-4" th:text="${stats.totalThreads()}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-success bg-opacity-10 rounded p-3">
                                <i class="bi bi-check-circle fs-4 text-success"></i>
                            </div>
                            <div>
                                <div class="text-muted small">활성 게시글</div>
                                <div class="fw-bold fs-4" th:text="${stats.activeThreads()}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-danger bg-opacity-10 rounded p-3">
                                <i class="bi bi-trash fs-4 text-danger"></i>
                            </div>
                            <div>
                                <div class="text-muted small">삭제된 게시글</div>
                                <div class="fw-bold fs-4" th:text="${stats.deletedThreads()}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-warning bg-opacity-10 rounded p-3">
                                <i class="bi bi-chat-dots fs-4 text-warning"></i>
                            </div>
                            <div>
                                <div class="text-muted small">전체 댓글</div>
                                <div class="fw-bold fs-4" th:text="${stats.totalComments()}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-info bg-opacity-10 rounded p-3">
                                <i class="bi bi-geo-alt fs-4 text-info"></i>
                            </div>
                            <div>
                                <div class="text-muted small">등록된 지역</div>
                                <div class="fw-bold fs-4" th:text="${stats.totalRegions()}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-secondary bg-opacity-10 rounded p-3">
                                <i class="bi bi-calendar-day fs-4 text-secondary"></i>
                            </div>
                            <div>
                                <div class="text-muted small">오늘 게시글</div>
                                <div class="fw-bold fs-4" th:text="${stats.todayThreads()}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 바로가기 -->
            <div class="row g-3">
                <div class="col-md-4">
                    <a href="/admin/threads" class="card border-0 shadow-sm text-decoration-none text-dark">
                        <div class="card-body text-center py-4">
                            <i class="bi bi-chat-square-text fs-2 text-primary mb-2"></i>
                            <div class="fw-semibold">게시글 관리</div>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a href="/admin/comments" class="card border-0 shadow-sm text-decoration-none text-dark">
                        <div class="card-body text-center py-4">
                            <i class="bi bi-chat-dots fs-2 text-warning mb-2"></i>
                            <div class="fw-semibold">댓글 관리</div>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a href="/admin/regions" class="card border-0 shadow-sm text-decoration-none text-dark">
                        <div class="card-body text-center py-4">
                            <i class="bi bi-geo-alt fs-2 text-info mb-2"></i>
                            <div class="fw-semibold">지역 현황</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
