services:
  postgres:
    image: postgres:16-alpine
    container_name: glance-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-glance}
      POSTGRES_USER: ${DB_USERNAME:-glance}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-glance}
    ports:
      - "5435:5432"
    volumes:
      - glance-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-glance} -d ${POSTGRES_DB:-glance}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: glance-redis
    ports:
      - "6381:6379"
    volumes:
      - glance-redis-data:/data

  app:
    build: .
    container_name: glance-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-glance}
      DB_USERNAME: ${DB_USERNAME:-glance}
      DB_PASSWORD: ${DB_PASSWORD:-glance}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8081:8080"

volumes:
  glance-postgres-data:
  glance-redis-data:
