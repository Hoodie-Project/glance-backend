<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{admin/layout :: head('신고 관리')}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/layout :: sidebar('reports')}"></div>

        <div class="col-10 p-4">
            <h4 class="fw-bold mb-4">신고 관리</h4>

            <div th:if="${message}" class="alert alert-success alert-dismissible fade show mb-4">
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- 필터 -->
            <form method="get" action="/admin/reports" class="card border-0 shadow-sm mb-4">
                <div class="card-body d-flex gap-2 align-items-center">
                    <select name="status" class="form-select" style="width:160px">
                        <option value="">전체 상태</option>
                        <option th:each="s : ${statuses}"
                                th:value="${s}"
                                th:text="${s}"
                                th:selected="${s == selectedStatus}"></option>
                    </select>
                    <select name="targetType" class="form-select" style="width:160px">
                        <option value="">전체 대상</option>
                        <option th:each="t : ${targetTypes}"
                                th:value="${t}"
                                th:text="${t}"
                                th:selected="${t == selectedTargetType}"></option>
                    </select>
                    <button type="submit" class="btn btn-primary text-nowrap">적용</button>
                    <a href="/admin/reports" class="btn btn-outline-secondary text-nowrap">초기화</a>
                </div>
            </form>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width:60px">ID</th>
                                <th style="width:90px">대상</th>
                                <th style="width:80px">대상 ID</th>
                                <th style="width:130px">사유</th>
                                <th>설명</th>
                                <th style="width:120px">신고 IP</th>
                                <th style="width:130px">신고일</th>
                                <th style="width:90px">상태</th>
                                <th style="width:140px">액션</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="report : ${reports}">
                                <td th:text="${report.id}"></td>
                                <td>
                                    <span th:if="${report.targetType.name() == 'THREAD'}" class="badge bg-primary">스레드</span>
                                    <span th:if="${report.targetType.name() == 'COMMENT'}" class="badge bg-secondary">댓글</span>
                                </td>
                                <td>
                                    <a th:if="${report.targetType.name() == 'THREAD'}"
                                       th:href="@{/admin/threads/{id}(id=${report.targetId})}"
                                       th:text="'#' + ${report.targetId}"
                                       class="text-decoration-none small"></a>
                                    <a th:if="${report.targetType.name() == 'COMMENT'}"
                                       th:href="@{/admin/comments(page=0)}"
                                       th:text="'#' + ${report.targetId}"
                                       class="text-decoration-none small"></a>
                                </td>
                                <td>
                                    <span th:switch="${report.reason.name()}">
                                        <span th:case="'SPAM'" class="small">스팸/광고</span>
                                        <span th:case="'PROFANITY'" class="small">욕설/비방</span>
                                        <span th:case="'ADULT_CONTENT'" class="small">성인 콘텐츠</span>
                                        <span th:case="'PRIVACY_VIOLATION'" class="small">개인정보 침해</span>
                                        <span th:case="'FRAUD'" class="small">사기/허위정보</span>
                                        <span th:case="*" class="small">기타</span>
                                    </span>
                                </td>
                                <td class="small text-muted" th:text="${report.description != null ? report.description : '-'}"></td>
                                <td class="small font-monospace" th:text="${report.clientIp}"></td>
                                <td class="small text-muted" th:text="${#temporals.format(report.createdAt, 'MM-dd HH:mm')}"></td>
                                <td>
                                    <span th:switch="${report.status.name()}">
                                        <span th:case="'PENDING'" class="badge bg-warning text-dark">대기중</span>
                                        <span th:case="'RESOLVED'" class="badge bg-success">처리됨</span>
                                        <span th:case="'DISMISSED'" class="badge bg-secondary">기각됨</span>
                                    </span>
                                </td>
                                <td>
                                    <div th:if="${report.status.name() == 'PENDING'}" class="d-flex gap-1">
                                        <form th:action="@{/admin/reports/{id}/resolve(id=${report.id})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-success py-0 px-2">처리</button>
                                        </form>
                                        <form th:action="@{/admin/reports/{id}/dismiss(id=${report.id})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-secondary py-0 px-2">기각</button>
                                        </form>
                                    </div>
                                    <span th:unless="${report.status.name() == 'PENDING'}"
                                          class="small text-muted"
                                          th:text="${#temporals.format(report.resolvedAt, 'MM-dd HH:mm')}"></span>
                                </td>
                            </tr>
                            <tr th:if="${reports.isEmpty()}">
                                <td colspan="9" class="text-center text-muted py-4">신고가 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <nav th:if="${reports.totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${reports.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/reports(page=${reports.number - 1}, status=${selectedStatus}, targetType=${selectedTargetType})}">이전</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, reports.totalPages - 1)}"
                        th:classappend="${i == reports.number} ? 'active'">
                        <a class="page-link" th:href="@{/admin/reports(page=${i}, status=${selectedStatus}, targetType=${selectedTargetType})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${reports.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/reports(page=${reports.number + 1}, status=${selectedStatus}, targetType=${selectedTargetType})}">다음</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
