<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Glance Admin - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/images/logo_primary_16px.png}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/images/logo_primary_32px.png}">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height: 100vh;">
<div class="card shadow" style="width: 360px;">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <img th:src="@{/images/logo_primary_128px.png}" alt="Glance" style="height: 64px; object-fit: contain;">
            <h4 class="mt-3 fw-bold">Glance Admin</h4>
        </div>
        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2 small">
            로그아웃됐습니다.
        </div>
        <form th:action="@{/admin/login}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-semibold">아이디</label>
                <input type="text" name="username" class="form-control" autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-semibold">비밀번호</label>
                <input type="password" name="password" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary w-100">로그인</button>
        </form>
    </div>
</div>
</body>
</html>
