<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{admin/layout :: head('댓글 관리')}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/layout :: sidebar('comments')}"></div>

        <div class="col-10 p-4">
            <h4 class="fw-bold mb-4">댓글 관리</h4>

            <div th:if="${message}" class="alert alert-success alert-dismissible fade show mb-4">
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- 필터 -->
            <form method="get" action="/admin/comments" class="card border-0 shadow-sm mb-4">
                <div class="card-body d-flex gap-2">
                    <div class="form-check form-switch d-flex align-items-center ms-2 text-nowrap">
                        <input class="form-check-input me-2" type="checkbox" name="showDeleted" value="true"
                               th:checked="${showDeleted}" id="showDeleted">
                        <label class="form-check-label" for="showDeleted">삭제된 댓글 포함</label>
                    </div>
                    <button type="submit" class="btn btn-primary text-nowrap">적용</button>
                    <a href="/admin/comments" class="btn btn-outline-secondary text-nowrap">초기화</a>
                </div>
            </form>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width:60px">ID</th>
                                <th style="width:120px">닉네임</th>
                                <th>내용</th>
                                <th style="width:100px">스레드</th>
                                <th style="width:80px">좋아요</th>
                                <th style="width:130px">작성일</th>
                                <th style="width:80px">상태</th>
                                <th style="width:110px">액션</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="comment : ${comments}" th:classappend="${comment.deletedAt != null} ? 'table-danger'">
                                <td th:text="${comment.id}"></td>
                                <td th:text="${comment.nickname}" class="small text-muted"></td>
                                <td th:text="${comment.content}"></td>
                                <td>
                                    <a th:href="@{/admin/threads/{id}(id=${comment.thread.id})}"
                                       th:text="'#' + ${comment.thread.id}"
                                       class="text-decoration-none small"></a>
                                </td>
                                <td th:text="${comment.likeCount}"></td>
                                <td th:text="${#temporals.format(comment.createdAt, 'MM-dd HH:mm')}" class="small text-muted"></td>
                                <td>
                                    <span th:if="${comment.deletedAt != null}" class="badge bg-danger">삭제됨</span>
                                    <span th:unless="${comment.deletedAt != null}" class="badge bg-success">활성</span>
                                </td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <form th:if="${comment.deletedAt != null}"
                                              th:action="@{/admin/comments/{id}/restore(id=${comment.id})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-success py-0 px-2">복구</button>
                                        </form>
                                        <form th:unless="${comment.deletedAt != null}"
                                              th:action="@{/admin/comments/{id}/delete(id=${comment.id})}" method="post"
                                              onsubmit="return confirm('삭제하시겠습니까?')">
                                            <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2">삭제</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${comments.isEmpty()}">
                                <td colspan="8" class="text-center text-muted py-4">댓글이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <nav th:if="${comments.totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${comments.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/comments(page=${comments.number - 1}, showDeleted=${showDeleted})}">이전</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, comments.totalPages - 1)}"
                        th:classappend="${i == comments.number} ? 'active'">
                        <a class="page-link" th:href="@{/admin/comments(page=${i}, showDeleted=${showDeleted})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${comments.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/comments(page=${comments.number + 1}, showDeleted=${showDeleted})}">다음</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
