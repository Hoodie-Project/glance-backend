services:
  postgres:
    image: postgres:16-alpine
    container_name: glance-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - glance-postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: glance-redis-prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - glance-redis-prod-data:/data

  app:
    build: .
    container_name: glance-app-prod
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8000
    ports:
      - "8000:8000"

volumes:
  glance-postgres-prod-data:
  glance-redis-prod-data:
