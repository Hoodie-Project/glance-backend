name: Prod Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2) JDK 세팅
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3) jar 빌드
      - name: Build
        run: ./gradlew bootJar --no-daemon

      # 4) Docker Buildx 세팅 (멀티 플랫폼 빌드용)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5) GHCR 로그인
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6) 이미지 빌드 & GHCR 푸시 (arm64, GHA 캐시 활용)
      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/hoodie-project/glance-backend:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7) 맥미니 SSH 접속 → 최신 이미지 pull 후 재시작
      - name: Deploy to Mac mini
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
            cd /Users/macmini/glance/glance-backend

            # compose 파일만 최신화 (로컬 작업 코드는 건드리지 않음)
            git fetch origin
            git checkout origin/main -- docker-compose.prod.yml

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker context use colima || true

            docker-compose -p glance-prod -f docker-compose.prod.yml --env-file .env.prod pull app
            docker-compose -p glance-prod -f docker-compose.prod.yml --env-file .env.prod up -d --force-recreate app
            docker image prune -f
