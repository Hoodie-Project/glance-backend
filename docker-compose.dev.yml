services:
  postgres:
    image: postgres:16-alpine
    container_name: glance-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - glance-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: glance-redis-dev
    ports:
      - "6381:6379"
    volumes:
      - glance-redis-data:/data

  app:
    image: ghcr.io/hoodie-project/glance-backend:dev-latest
    container_name: glance-app-dev
    env_file: .env.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8000
    ports:
      - "8080:8000"

volumes:
  glance-postgres-data:
  glance-redis-data:
