spring:
  application:
    name: glance-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/glance
    username: ${DB_USERNAME:ian}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

geocoding:
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
