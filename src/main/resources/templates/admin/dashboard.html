<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{admin/layout :: head('대시보드')}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/layout :: sidebar('dashboard')}"></div>

        <div class="col-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">대시보드</h4>
                <span class="text-muted small" id="current-datetime"></span>
            </div>

            <!-- 미처리 신고 알림 배너 -->
            <div th:if="${stats.pendingReports() > 0}"
                 class="alert d-flex align-items-center gap-2 mb-4 border-0"
                 style="background-color: #fff5f5; border-left: 4px solid #dc3545 !important; border-radius: 8px;">
                <i class="bi bi-exclamation-triangle-fill text-danger"></i>
                <span>미처리 신고가 <strong th:text="${stats.pendingReports()}"></strong>건 있습니다.</span>
                <a href="/admin/reports" class="ms-auto btn btn-sm btn-danger">확인하기</a>
            </div>

            <!-- 통계 카드 -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="text-muted small mb-1">전체 스레드</div>
                                    <div class="fw-bold fs-3" th:text="${stats.totalThreads()}">0</div>
                                </div>
                                <div class="bg-primary bg-opacity-10 rounded-3 p-2">
                                    <i class="bi bi-chat-square-text fs-5 text-primary"></i>
                                </div>
                            </div>
                            <div class="mt-2 small text-muted">
                                활성 <span class="text-success fw-semibold" th:text="${stats.activeThreads()}">0</span>
                                &nbsp;·&nbsp;
                                삭제 <span class="text-danger fw-semibold" th:text="${stats.deletedThreads()}">0</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="text-muted small mb-1">전체 댓글</div>
                                    <div class="fw-bold fs-3" th:text="${stats.totalComments()}">0</div>
                                </div>
                                <div class="bg-warning bg-opacity-10 rounded-3 p-2">
                                    <i class="bi bi-chat-dots fs-5 text-warning"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="text-muted small mb-1">등록된 지역</div>
                                    <div class="fw-bold fs-3" th:text="${stats.totalRegions()}">0</div>
                                </div>
                                <div class="bg-info bg-opacity-10 rounded-3 p-2">
                                    <i class="bi bi-geo-alt fs-5 text-info"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100"
                         th:classappend="${stats.pendingReports() > 0} ? 'border-danger border-opacity-50' : ''">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="text-muted small mb-1">미처리 신고</div>
                                    <div class="fw-bold fs-3"
                                         th:text="${stats.pendingReports()}"
                                         th:classappend="${stats.pendingReports() > 0} ? 'text-danger' : ''">0</div>
                                </div>
                                <div class="bg-danger bg-opacity-10 rounded-3 p-2">
                                    <i class="bi bi-flag fs-5 text-danger"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 오늘 현황 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body d-flex align-items-center gap-2">
                    <i class="bi bi-calendar-check text-secondary"></i>
                    <span class="text-muted small">오늘 새 스레드</span>
                    <span class="fw-bold" th:text="${stats.todayThreads()}">0</span>
                    <span class="text-muted small">건</span>
                </div>
            </div>

            <!-- 바로가기 -->
            <h6 class="text-muted fw-semibold mb-3 text-uppercase" style="font-size: 0.75rem; letter-spacing: 0.05em;">바로가기</h6>
            <div class="row g-3">
                <div class="col-md-3">
                    <a href="/admin/threads" class="card border-0 shadow-sm text-decoration-none text-dark h-100" style="transition: transform 0.15s; cursor: pointer;"
                       onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                        <div class="card-body text-center py-4">
                            <div class="bg-primary bg-opacity-10 rounded-3 d-inline-flex p-3 mb-3">
                                <i class="bi bi-chat-square-text fs-4 text-primary"></i>
                            </div>
                            <div class="fw-semibold">스레드 관리</div>
                            <div class="text-muted small mt-1">작성 내역 조회 · 삭제</div>
                        </div>
                    </a>
                </div>
                <div class="col-md-3">
                    <a href="/admin/comments" class="card border-0 shadow-sm text-decoration-none text-dark h-100" style="transition: transform 0.15s; cursor: pointer;"
                       onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                        <div class="card-body text-center py-4">
                            <div class="bg-warning bg-opacity-10 rounded-3 d-inline-flex p-3 mb-3">
                                <i class="bi bi-chat-dots fs-4 text-warning"></i>
                            </div>
                            <div class="fw-semibold">댓글 관리</div>
                            <div class="text-muted small mt-1">댓글 조회 · 삭제</div>
                        </div>
                    </a>
                </div>
                <div class="col-md-3">
                    <a href="/admin/regions" class="card border-0 shadow-sm text-decoration-none text-dark h-100" style="transition: transform 0.15s; cursor: pointer;"
                       onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                        <div class="card-body text-center py-4">
                            <div class="bg-info bg-opacity-10 rounded-3 d-inline-flex p-3 mb-3">
                                <i class="bi bi-geo-alt fs-4 text-info"></i>
                            </div>
                            <div class="fw-semibold">지역 현황</div>
                            <div class="text-muted small mt-1">행정동 등록 현황</div>
                        </div>
                    </a>
                </div>
                <div class="col-md-3">
                    <a href="/admin/reports" class="card border-0 shadow-sm text-decoration-none text-dark h-100" style="transition: transform 0.15s; cursor: pointer;"
                       onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                        <div class="card-body text-center py-4">
                            <div class="bg-danger bg-opacity-10 rounded-3 d-inline-flex p-3 mb-3">
                                <i class="bi bi-flag fs-4 text-danger"></i>
                            </div>
                            <div class="fw-semibold">신고 관리</div>
                            <div class="text-muted small mt-1">신고 내역 처리</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        function updateDatetime() {
            const now = new Date();
            document.getElementById('current-datetime').textContent =
                now.toLocaleDateString('ko-KR', {year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'})
                + ' ' + now.toLocaleTimeString('ko-KR', {hour: '2-digit', minute: '2-digit'});
        }
        updateDatetime();
        setInterval(updateDatetime, 60000);
    })();
</script>
</body>
</html>
