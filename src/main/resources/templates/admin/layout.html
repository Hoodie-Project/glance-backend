<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' - Glance Admin'">Glance Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/images/logo_primary_16px.png}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/images/logo_primary_32px.png}">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background-color: #343a40; border-radius: 6px; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
    </style>
</head>
<body>
<div th:fragment="sidebar(currentMenu)" class="col-2 sidebar px-3 py-4 d-flex flex-column">
    <div class="brand mb-4 px-2 d-flex align-items-center gap-2">
        <img th:src="@{/images/logo_primary_48px.png}" alt="Glance" style="height: 36px; object-fit: contain;">
        <span>Glance</span>
    </div>
    <ul class="nav flex-column gap-1 flex-grow-1">
        <li class="nav-item">
            <a class="nav-link px-2 py-2" th:classappend="${currentMenu == 'dashboard'} ? 'active'" href="/admin">
                <i class="bi bi-speedometer2 me-2"></i>대시보드
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link px-2 py-2" th:classappend="${currentMenu == 'threads'} ? 'active'" href="/admin/threads">
                <i class="bi bi-chat-square-text me-2"></i>스레드
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link px-2 py-2" th:classappend="${currentMenu == 'comments'} ? 'active'" href="/admin/comments">
                <i class="bi bi-chat-dots me-2"></i>댓글
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link px-2 py-2" th:classappend="${currentMenu == 'regions'} ? 'active'" href="/admin/regions">
                <i class="bi bi-geo-alt me-2"></i>지역
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link px-2 py-2" th:classappend="${currentMenu == 'reports'} ? 'active'" href="/admin/reports">
                <i class="bi bi-flag me-2"></i>신고
            </a>
        </li>
    </ul>
    <div class="pt-3 border-top border-secondary">
        <form th:action="@{/admin/logout}" method="post">
            <button type="submit" class="btn btn-sm btn-outline-secondary w-100">
                <i class="bi bi-box-arrow-left me-1"></i>로그아웃
            </button>
        </form>
    </div>
</div>
</body>
</html>
