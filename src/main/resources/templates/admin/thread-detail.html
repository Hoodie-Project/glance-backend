<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{admin/layout :: head('게시글 상세')}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/layout :: sidebar('threads')}"></div>

        <div class="col-10 p-4">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="/admin/threads" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> 목록
                </a>
                <h4 class="fw-bold mb-0">게시글 상세</h4>
                <span th:if="${thread.deletedAt != null}" class="badge bg-danger">삭제됨</span>
            </div>

            <div class="row g-4">
                <!-- 게시글 정보 -->
                <div class="col-md-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white fw-semibold">게시글 내용</div>
                        <div class="card-body">
                            <dl class="row mb-0">
                                <dt class="col-3 text-muted">ID</dt>
                                <dd class="col-9" th:text="${thread.id}"></dd>
                                <dt class="col-3 text-muted">제목</dt>
                                <dd class="col-9 fw-semibold" th:text="${thread.title}"></dd>
                                <dt class="col-3 text-muted">내용</dt>
                                <dd class="col-9" th:text="${thread.content}"></dd>
                                <dt class="col-3 text-muted">닉네임</dt>
                                <dd class="col-9" th:text="${thread.nickname}"></dd>
                                <dt class="col-3 text-muted">성별</dt>
                                <dd class="col-9" th:text="${thread.gender}"></dd>
                                <dt class="col-3 text-muted">해시태그</dt>
                                <dd class="col-9">
                                    <span th:each="tag : ${thread.tags}" class="badge bg-secondary me-1" th:text="'#' + ${tag}"></span>
                                    <span th:if="${thread.tags.isEmpty()}" class="text-muted small">없음</span>
                                </dd>
                                <dt class="col-3 text-muted">동물상</dt>
                                <dd class="col-9">
                                    <span th:each="look : ${thread.animalLooks}" class="badge bg-info me-1" th:text="${look}"></span>
                                    <span th:if="${thread.animalLooks.isEmpty()}" class="text-muted small">없음</span>
                                </dd>
                                <dt class="col-3 text-muted">분위기</dt>
                                <dd class="col-9">
                                    <span th:each="vibe : ${thread.vibeStyles}" class="badge bg-warning text-dark me-1" th:text="${vibe}"></span>
                                    <span th:if="${thread.vibeStyles.isEmpty()}" class="text-muted small">없음</span>
                                </dd>
                                <dt class="col-3 text-muted">좋아요</dt>
                                <dd class="col-9" th:text="${thread.likeCount}"></dd>
                                <dt class="col-3 text-muted">댓글 수</dt>
                                <dd class="col-9" th:text="${thread.commentCount}"></dd>
                                <dt class="col-3 text-muted">작성일</dt>
                                <dd class="col-9" th:text="${#temporals.format(thread.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></dd>
                                <dt class="col-3 text-muted" th:if="${thread.deletedAt != null}">삭제일</dt>
                                <dd class="col-9 text-danger" th:if="${thread.deletedAt != null}"
                                    th:text="${#temporals.format(thread.deletedAt, 'yyyy-MM-dd HH:mm:ss')}"></dd>
                            </dl>
                        </div>
                    </div>

                    <!-- 댓글 목록 -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-semibold">
                            댓글 <span class="badge bg-secondary" th:text="${#lists.size(comments)}"></span>
                        </div>
                        <div class="card-body p-0">
                            <div th:if="${#lists.isEmpty(comments)}" class="text-center text-muted py-4">댓글이 없습니다.</div>
                            <div th:each="comment : ${comments}" class="p-3 border-bottom">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <div th:text="${comment.content}"></div>
                                        <small class="text-muted" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                                    </div>
                                    <form th:action="@{/admin/comments/{id}/delete(id=${comment.id})}" method="post"
                                          onsubmit="return confirm('삭제하시겠습니까?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger py-0">삭제</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 사이드 정보 -->
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-header bg-white fw-semibold">위치 정보</div>
                        <div class="card-body">
                            <dl class="row mb-0">
                                <dt class="col-4 text-muted small">위도</dt>
                                <dd class="col-8 small" th:text="${thread.latitude}"></dd>
                                <dt class="col-4 text-muted small">경도</dt>
                                <dd class="col-8 small" th:text="${thread.longitude}"></dd>
                                <th:block th:if="${thread.region != null}">
                                    <dt class="col-4 text-muted small">시도</dt>
                                    <dd class="col-8 small" th:text="${thread.region.sido}"></dd>
                                    <dt class="col-4 text-muted small">시군구</dt>
                                    <dd class="col-8 small" th:text="${thread.region.sigungu}"></dd>
                                    <dt class="col-4 text-muted small">동</dt>
                                    <dd class="col-8 small" th:text="${thread.region.dong}"></dd>
                                </th:block>
                            </dl>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-semibold">액션</div>
                        <div class="card-body d-grid gap-2">
                            <form th:if="${thread.deletedAt != null}"
                                  th:action="@{/admin/threads/{id}/restore(id=${thread.id})}" method="post">
                                <button type="submit" class="btn btn-success w-100">
                                    <i class="bi bi-arrow-counterclockwise me-1"></i>복구
                                </button>
                            </form>
                            <form th:action="@{/admin/threads/{id}/delete(id=${thread.id})}" method="post"
                                  onsubmit="return confirm('완전 삭제하시겠습니까? 댓글도 모두 삭제됩니다.')">
                                <button type="submit" class="btn btn-danger w-100">
                                    <i class="bi bi-trash me-1"></i>완전 삭제
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
